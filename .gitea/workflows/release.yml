on:
  push:
    tags:
      - 'v*'
    branches-ignore:
      - "**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version --settings .m2/settings.xml"

    services:
      zookeeper:
        image: zookeeper:3.9
        ports:
          - 2181:2181
        env:
          ZOO_4LW_COMMANDS_WHITELIST: mntr,conf,ruok

      solr:
        image: solr:9
        ports:
          - 8983:8983
        env:
          ZK_HOST: zookeeper:2181
          SOLR_OPTS: "-Dsolr.environment=dev,label=DEV+ENV"
        options: -e cloud

    steps:
      - name: Disable GIT TLS verification
        run: |
          git config --global http.sslVerify false
        shell: bash

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: "temurin"

      - name: Set up Maven
        uses: hb0730/maven-action@v1
        with:
          maven-version: 3.9.10

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      
      - name: Setup Go
        uses: https://github.com/actions/setup-go@v4
        with:
          go-version: '>=1.20.1'

      - name: Install siegfried
        run: |
          go install github.com/richardlehane/siegfried/cmd/sf@latest
          sf -update

      - name: Run Tests
        run: mvn $MAVEN_CLI_OPTS clean test
        env:
          CICD_GITHUB_USERNAME_MAVEN: ${{ secrets.CICD_GITHUB_USERNAME_MAVEN }}
          CICD_GITHUB_TOKEN_MAVEN: ${{ secrets.CICD_GITHUB_TOKEN_MAVEN }}
          RODA_CORE_SOLR_TYPE: CLOUD
          RODA_CORE_SOLR_CLOUD_URLS: zookeeper:2181
      
      - name: Build
        run: mvn $MAVEN_CLI_OPTS clean package -Dmaven.test.skip=true
        env:
          CICD_GITHUB_USERNAME_MAVEN: ${{ secrets.CICD_GITHUB_USERNAME_MAVEN }}
          CICD_GITHUB_TOKEN_MAVEN: ${{ secrets.CICD_GITHUB_TOKEN_MAVEN }}

      - name: Extract version from pom.xml
        run: echo "PLUGIN_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Sign plugin
        run: |
          mkdir -p ./codesign
          echo "$PLUGIN_CA_PEM" > ./codesign/plugin-ca.pem
          echo "$CODE_SIGN_PEM" > ./codesign/code-sign.pem
          echo "$CODE_SIGN_KEY" > ./codesign/code-sign.key
          ./.gitea/workflows/bin/sign-plugin.sh
          rm "./target/$PLUGIN_BASENAME/$JAR_FILE"
          mv "./codesign/$JAR_FILE" "./target/$PLUGIN_BASENAME/$JAR_FILE"
          cd "./target"
          zip -r "./$PLUGIN_BASENAME.zip" "./$PLUGIN_BASENAME"
        env:
          PLUGIN_BASENAME: ${{ vars.PLUGIN_BASENAME }}
          PLUGIN_CA_PEM: ${{ vars.PLUGIN_CA_PEM }}
          CODE_SIGN_PEM: ${{ vars.CODE_SIGN_PEM }}
          CODE_SIGN_KEY: ${{ secrets.CODE_SIGN_KEY }}
          JAR_FILE: ${{ vars.PLUGIN_BASENAME }}-${{ env.PLUGIN_VERSION }}.jar

      - name: Extract changelog for this release
        id: changelog
        run: |
          VERSION="${{ gitea.ref_name }}"
          # Remove leading 'v' if present
          VERSION="${VERSION#v}"
          awk "/^## \\[${VERSION//./\\.}\\]/ {flag=1; next} /^## \\[/ {flag=0} flag" CHANGELOG.md > RELEASE_CHANGELOG.md
          if [ ! -s RELEASE_CHANGELOG.md ]; then
            echo "No changelog entry found for version $VERSION" >&2
            exit 1
          fi
          echo 'RELEASE_NOTES<<EOF' >> $GITHUB_ENV
          cat RELEASE_CHANGELOG.md >> $GITHUB_ENV
          echo 'EOF' >> $GITHUB_ENV
      
      - name: Release artifacts
        uses: https://gitea.com/actions/release-action@main
        with:
          files: target/${{ vars.PLUGIN_BASENAME}}.zip
          title: ${{ gitea.ref_name }}
          body: |
            ## ${{ vars.PLUGIN_NAME }} Plugin ${{ gitea.ref_name }}
            
            **Commit**: `${{ gitea.sha }}`

            ### Changelog
            ${{ env.RELEASE_NOTES }}
            
            ### Installation
            [Download](${{ gitea.server_url }}/${{ gitea.repository }}/releases/download/${{ gitea.ref_name }}/${{ vars.PLUGIN_BASENAME }}.zip) and extract the plugin zip to your ETERNA plugins directory.
          insecure: true
          api_key: ${{ secrets.CICD_GITEA_TOKEN }}
      