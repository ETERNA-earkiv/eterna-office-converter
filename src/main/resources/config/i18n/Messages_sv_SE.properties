office-converter.pdf.title = PDF
office-converter.pdfa.title = PDF/A
office-converter.html.title = HTML
office-converter.txt.title = Text
office-converter.odt.title = ODT

######################################
# Office Converter ? Format Descriptions (SV)
######################################

office-converter.pdf.description = \
Standard PDF-utdata. Lämplig för visning och distribution. \
Bevarar layout men är inte alltid arkivsäker.

office-converter.pdfa.description = \
Arkivkompatibelt PDF/A-format. Säkerställer långtidsbevarande genom att bädda in \
typsnitt, metadata och följa strikta arkivstandarder.

office-converter.html.description = \
Konverterar dokumentet till HTML-format. Användbart för webbpublicering eller \
textextrahering. Behåller inte layout perfekt för komplexa dokument.

office-converter.txt.description = \
Konverterar dokumentet till oformaterad text. Bäst när endast textinnehållet behövs. \
All layout, bilder och formatering tas bort.

office-converter.odt.description = \
Konverterar till OpenDocument Text (ODT), en öppen standard för redigerbara dokument. \
Lämplig för långtidsredigering eller interoperabilitet.
