office-documents-converter.pdf.title = PDF
office-documents-converter.pdf.description = A widely supported, fixed-layout document format ideal for sharing, distribution, and printing. Preserves layout, fonts, and graphics consistently across platforms. Recommended for dissemination and long-term access when PDF/A profiles are used.

office-documents-converter.pdfa-1a.title = PDF/A-1A
office-documents-converter.pdfa-1a.description = PDF/A-1A (ISO 19005-1) ? archival PDF profile that guarantees long-term preservation with embedded fonts, device-independent color, and full tagged/semantic structure for accessibility. Use when both visual fidelity and document structure/accessibility must be preserved.

office-documents-converter.pdfa-1b.title = PDF/A-1B
office-documents-converter.pdfa-1b.description = PDF/A-1B (ISO 19005-1) ? archival PDF profile focused on visual reproducibility. Ensures embedded fonts and consistent rendering across platforms but does not require full tagged structure. Use when visual fidelity is the primary archival requirement.

office-documents-converter.pdfa-2b.title = PDF/A-2B
office-documents-converter.pdfa-2b.description = PDF/A-2B (ISO 19005-2) ? modern archival PDF profile supporting newer PDF features (e.g., JPEG2000, transparency, improved compression) while ensuring visual preservation. Use for archival workflows that benefit from updated PDF capabilities.

office-documents-converter.pdfa-3b.title = PDF/A-3B
office-documents-converter.pdfa-3b.description = PDF/A-3B (ISO 19005-3) ? archival PDF profile equivalent to PDF/A-2B with the additional ability to embed arbitrary file types (for example XML or source office files). Useful when you need to include original source files alongside the archival PDF.


