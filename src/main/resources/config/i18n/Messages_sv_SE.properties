office-documents-converter.odt.description = OpenDocument Text format used by LibreOffice and other open-standard tools. Suitable for editable document preservation.

office-documents-converter.ott.title = OTT
office-documents-converter.ott.description = OpenDocument Text Template format, used for creating pre-defined document layouts.

office-documents-converter.doc.title = DOC
office-documents-converter.doc.description = Microsoft Word binary format (97?2003). Good for compatibility with older systems but not recommended for archival.

office-documents-converter.docx.title = DOCX
office-documents-converter.docx.description = Microsoft Word OOXML format. Widely supported, suitable for editable document exchange.

office-documents-converter.rtf.title = RTF
office-documents-converter.rtf.description = Rich Text Format. Compatible with many editors and preserves basic formatting. Good for simple text exchange.

office-documents-converter.txt.title = TXT
office-documents-converter.txt.description = Plain text format without formatting. Best for raw text extraction or minimal-content documents.

office-documents-converter.html.title = HTML
office-documents-converter.html.description = Web-compatible document format preserving text, images, and basic structure. Useful for online presentation and lightweight rendering.

office-documents-converter.xls.title = XLS
office-documents-converter.xls.description = Microsoft Excel binary format (97?2003). Good for compatibility with legacy systems.

office-documents-converter.xlsx.title = XLSX
office-documents-converter.xlsx.description = Microsoft Excel OOXML spreadsheet format. Widely used, ideal for modern data workflows.

office-documents-converter.csv.title = CSV
office-documents-converter.csv.description = Comma-separated values format used for raw data exchange. No formulas or formatting are preserved.

office-documents-converter.ods.title = ODS
